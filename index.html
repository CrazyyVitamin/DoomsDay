<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TYPE TO SHOOT</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
    canvas { display: block; cursor: none; }
    #ui-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; display: flex; justify-content: center; align-items: center;
      text-align: center;
    }
    .neon-text {
      color: #fff; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 30px #0ff;
      text-transform: uppercase; letter-spacing: 5px;
    }
    .blink { animation: blink 1s steps(2, start) infinite; }
    @keyframes blink { to { opacity: 0; } }
    #file-upload {
      position: absolute; top: 10px; right: 10px; z-index: 100;
      background: rgba(0, 255, 255, 0.2); color: #0ff; border: 1px solid #0ff;
      padding: 5px; cursor: pointer; font-family: monospace; font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="ui-layer"></div>
  <input type="file" id="file-upload" accept=".txt" title="Upload Word List">

  <script src="words.js"></script>
  <script>
    /**
     * ZType Clone - Neon Space Aesthetic
     * Built with Vanilla JS & HTML5 Canvas
     */

    const COLORS = {
      bg: '#000000',
      player: '#00FFFF',
      enemy: '#FF00FF',
      bullet: '#00BFFF',
      letterDone: '#888888',
      letterNext: '#FFFF00',
      letterPending: '#FFFFFF',
      explosion: ['#FF8800', '#FF4400', '#FF2200'],
      stars: '#FFFFFF',
      error: '#FF0000'
    };

    // ==================== Utilities ====================
    const rand = (min, max) => Math.random() * (max - min) + min;
    const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];

    // ==================== Sound Engine ====================
    class SoundEngine {
      constructor() {
        this.ctx = null;
      }

      init() {
        try {
          if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          }
          if (this.ctx.state === 'suspended') {
            this.ctx.resume();
          }
        } catch (e) {
          console.warn('AudioContext init failed:', e);
        }
      }

      createOsc(type, freqStart, freqEnd, dur, vol = 0.2) {
        try {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freqStart, this.ctx.currentTime);
          osc.frequency.exponentialRampToValueAtTime(freqEnd, this.ctx.currentTime + dur);
          gain.gain.setValueAtTime(vol, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + dur);
        } catch (e) {
          console.warn('Sound playback failed:', e);
        }
      }

      shoot() {
        if (!this.ctx) return;
        this.createOsc('sawtooth', 800, 200, 0.08);
      }

      explode() {
        if (!this.ctx) return;
        this.createOsc('sine', 200, 50, 0.3, 0.3);
      }

      error() {
        if (!this.ctx) return;
        this.createOsc('square', 100, 100, 0.05, 0.1);
      }

      lifeLost() {
        if (!this.ctx) return;
        this.createOsc('sine', 400, 100, 0.5, 0.3);
      }

      waveComplete() {
        if (!this.ctx) return;
        try {
          const notes = [261.63, 329.63, 392.00]; // C4, E4, G4
          notes.forEach((f, i) => {
            setTimeout(() => this.createOsc('sine', f, f * 1.01, 0.1, 0.2), i * 120);
          });
        } catch (e) {
          console.warn('Wave complete sound failed:', e);
        }
      }
    }

    // ==================== Game Entities ====================
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = rand(-3, 3);
        this.vy = rand(-3, 3);
        this.life = 1.0;
        this.decay = rand(0.01, 0.03);
        this.size = rand(1, 4);
        this.color = color;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life -= this.decay;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    class Bullet {
      constructor(playerX, playerY, target) {
        this.x = playerX;
        this.y = playerY;
        this.target = target;
        this.speed = 15;
        this.alive = true;
      }
      update() {
        const dx = this.target.x - this.x;
        const dy = (this.target.y + this.target.height / 2) - this.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 10) {
          this.alive = false;
          return true; // Hit
        }
        this.x += (dx / dist) * this.speed;
        this.y += (dy / dist) * this.speed;
        return false;
      }
      draw(ctx) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 10;
        ctx.shadowColor = COLORS.bullet;
        ctx.fillStyle = COLORS.bullet;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    class Enemy {
      constructor(word, x, speed, wave) {
        this.word = word;
        this.typed = 0;
        this.x = x;
        this.y = -50;
        this.speed = speed;
        this.width = 40;
        this.height = 30;
        this.wave = wave;
        this.dead = false;
        this.startTime = Date.now();
        this.zigzagPhase = rand(0, Math.PI * 2);
      }
      update(dt) {
        this.y += this.speed;
        if (this.wave >= 10) {
          this.x += Math.sin(Date.now() * 0.005 + this.zigzagPhase) * 2;
        }
      }
      draw(ctx) {
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.3;
        ctx.shadowBlur = 20;
        ctx.shadowColor = COLORS.enemy;
        ctx.strokeStyle = COLORS.enemy;
        ctx.lineWidth = 6;
        this.drawShipShape(ctx);
        ctx.stroke();
        ctx.globalAlpha = 1.0;
        ctx.shadowBlur = 0;
        ctx.lineWidth = 2;
        this.drawShipShape(ctx);
        ctx.stroke();
        ctx.restore();

        const fontSize = Math.max(14, window.innerHeight * 0.025);
        ctx.font = `bold ${fontSize}px monospace`;
        ctx.textAlign = 'center';
        const textX = this.x;
        const textY = this.y - 15;
        const fullText = this.word;
        let currentX = textX - ctx.measureText(fullText).width / 2;
        for (let i = 0; i < fullText.length; i++) {
          const char = fullText[i];
          if (i < this.typed) ctx.fillStyle = COLORS.letterDone;
          else if (i === this.typed) ctx.fillStyle = COLORS.letterNext;
          else ctx.fillStyle = COLORS.letterPending;
          ctx.fillText(char, currentX, textY);
          currentX += ctx.measureText(char).width;
        }
      }
      drawShipShape(ctx) {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y + this.height);
        ctx.lineTo(this.x - this.width/2, this.y);
        ctx.lineTo(this.x + this.width/2, this.y);
        ctx.closePath();
      }
    }

    class Player {
      constructor() {
        this.width = 40;
        this.height = 30;
        this.lives = 3;
      }
      getX() { return window.innerWidth / 2; }
      getY() { return window.innerHeight - 50; }
      draw(ctx) {
        const x = this.getX();
        const y = this.getY();
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.shadowBlur = 15;
        ctx.shadowColor = COLORS.player;
        ctx.strokeStyle = COLORS.player;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x, y - this.height/2);
        ctx.lineTo(x - this.width/2, y + this.height/2);
        ctx.lineTo(x + this.width/2, y + this.height/2);
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
      }
    }

    class WaveManager {
      constructor() {
        this.wave = 1;
        this.spawned = 0;
        this.enemiesToSpawn = 5;
        this.timer = 0;
      }
      getConfig() {
        if (this.wave <= 3) return { len: 'easy', speed: 0.6, gap: 2500, n: 5 };
        if (this.wave <= 6) return { len: 'medium', speed: 0.9, gap: 2000, n: 7 };
        return { len: 'hard', speed: 1.2, gap: 1500, n: 10 };
      }
      update(dt, game) {
        const cfg = this.getConfig();
        this.timer -= dt;
        if (this.timer <= 0 && this.spawned < this.enemiesToSpawn) {
          this.spawnEnemy(cfg, game);
          this.timer = cfg.gap;
        }
        if (this.spawned === this.enemiesToSpawn && game.enemies.length === 0) {
          this.wave++;
          this.spawned = 0;
          this.enemiesToSpawn = cfg.n + (this.wave * 1);
          try { game.sound.waveComplete(); } catch (e) {}
        }
      }
      spawnEnemy(cfg, game) {
        let attempts = 0;
        let word = '';

        do {
          if (game.customWords) {
            word = pickRandom(game.customWords);
          } else {
            // Get words from the correct difficulty bucket in words.js
            const pool = WORD_DATABASE[cfg.len];
            word = pickRandom(pool);
          }
          attempts++;
        } while (
          // Prevent exact word matches
          // For the first 20 attempts, also prevent words with the same starting letter 
          // to avoid typing lock-on conflicts.
          attempts < 50 && 
          game.enemies.some(e => 
            e.word === word || 
            (attempts < 20 && e.word[0].toLowerCase() === word[0].toLowerCase())
          )
        );

        const x = rand(50, window.innerWidth - 50);
        game.enemies.push(new Enemy(word, x, cfg.speed, this.wave));
        this.spawned++;
      }
    }

    class InputHandler {
      constructor(game) {
        this.game = game;
        this.locked = null;
        this.correct = 0;
        this.total = 0;
        this.combo = 0;
      }
      handleKey(key) {
        if (game.state !== 'PLAYING') return;
        this.total++;
        const char = key.toLowerCase();
        if (this.locked) {
          if (char === this.locked.word[this.locked.typed].toLowerCase()) {
            this.correct++;
            this.locked.typed++;
            this.game.shootBullet(this.locked);
            if (this.locked.typed === this.locked.word.length) {
              this.destroyEnemy(this.locked);
            }
          } else {
            this.fail();
          }
        } else {
          const target = this.game.enemies.find(e => e.word[0].toLowerCase() === char);
          if (target) {
            this.locked = target;
            this.locked.typed = 1;
            this.game.shootBullet(target);
            this.correct++;
            try { this.game.sound.shoot(); } catch (e) {}
          } else {
            this.fail();
          }
        }
      }
      fail() {
        try { this.game.sound.error(); } catch (e) {}
        this.game.flashError();
        this.combo = 0;
      }
      destroyEnemy(enemy) {
        enemy.dead = true;
        this.combo++;
        try { this.game.sound.explode(); } catch (e) {}
        this.game.spawnExplosion(enemy.x, enemy.y);
        let pts = enemy.word.length * 10;
        const timeTaken = (Date.now() - enemy.startTime) / 1000;
        if (timeTaken < 2) pts += 50;
        if (this.combo >= 3) pts *= 1.5;
        this.game.addScore(Math.round(pts), enemy.x, enemy.y);
        this.locked = null;
      }
    }

    class Game {
      constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.ui = document.getElementById('ui-layer');
        this.state = 'START';
        this.score = 0;
        this.hiscore = localStorage.getItem('ztype_hiscore') || 0;
        this.customWords = null;
        this.errorFlash = 0;
        this.player = new Player();
        this.sound = new SoundEngine();
        this.waveMgr = new WaveManager();
        this.input = new InputHandler(this);
        this.enemies = [];
        this.bullets = [];
        this.particles = [];
        this.floating = [];
        this.stars = [];
        window.addEventListener('resize', () => this.resize());
        this.resize();
        this.initStars();
        this.setupEvents();
      }
      resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
      }
      initStars() {
        for (let i = 0; i < 250; i++) {
          this.stars.push({
            x: rand(0, this.canvas.width),
            y: rand(0, this.canvas.height),
            s: rand(0.1, 1.5),
            o: rand(0.2, 0.8)
          });
        }
      }
      setupEvents() {
        window.addEventListener('keydown', (e) => {
          if (this.state === 'START') {
            this.start();
          } else if (this.state === 'GAMEOVER' && e.key === 'Enter') {
            this.start();
          } else if (this.state === 'PLAYING') {
            if (e.key === 'Escape') this.state = 'PAUSED';
            else if (e.key.length === 1) this.input.handleKey(e.key);
          } else if (this.state === 'PAUSED' && e.key === 'Escape') {
            this.state = 'PLAYING';
          }
        });
        document.getElementById('file-upload').addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            const words = ev.target.result.split(/\r?\n/).map(s => s.trim().toLowerCase()).filter(s => s.length > 1);
            this.customWords = words;
            alert(`Loaded ${words.length} words!`);
          };
          reader.readAsText(file);
        });
      }
      start() {
        this.state = 'PLAYING';
        this.sound.init();
        this.score = 0;
        this.player.lives = 3;
        this.waveMgr.wave = 1;
        this.waveMgr.spawned = 0;
        this.waveMgr.timer = 0;
        this.enemies = [];
        this.bullets = [];
        this.particles = [];
        this.floating = [];
        this.input.correct = 0;
        this.input.total = 0;
        this.input.combo = 0;
        this.input.locked = null;
      }
      shootBullet(target) {
        this.bullets.push(new Bullet(this.player.getX(), this.player.getY(), target));
        try { this.sound.shoot(); } catch (e) {}
      }
      spawnExplosion(x, y) {
        const color = pickRandom(COLORS.explosion);
        for (let i = 0; i < 20; i++) this.particles.push(new Particle(x, y, color));
      }
      addScore(pts, x, y) {
        this.score += pts;
        this.floating.push({ x, y, val: `+${pts}`, life: 1.0 });
      }
      flashError() {
        this.errorFlash = 1.0;
      }
      gameOver() {
        this.state = 'GAMEOVER';
        if (this.score > this.hiscore) {
          this.hiscore = this.score;
          localStorage.setItem('ztype_hiscore', this.hiscore);
        }
      }
      update(dt) {
        if (this.state !== 'PLAYING') return;
        this.waveMgr.update(dt, this);
        this.enemies.forEach(e => {
          e.update(dt);
          if (e.y > this.canvas.height - 50) {
            this.player.lives--;
            e.dead = true;
            this.spawnExplosion(e.x, e.y);
            try { this.sound.lifeLost(); } catch (ex) {}
            if (this.player.lives <= 0) this.gameOver();
          }
        });
        this.enemies = this.enemies.filter(e => !e.dead);
        this.bullets.forEach((b, i) => {
          if (b.update()) {
            b.alive = false;
            for(let j = 0; j < 5; j++) this.particles.push(new Particle(b.x, b.y, '#fff'));
          }
        });
        this.bullets = this.bullets.filter(b => b.alive);
        this.particles.forEach(p => p.update());
        this.particles = this.particles.filter(p => p.life > 0);
        this.floating.forEach(f => {
          f.y -= 0.5;
          f.life -= 0.02;
        });
        this.floating = this.floating.filter(f => f.life > 0);
        if (this.errorFlash > 0) this.errorFlash -= 0.1;
      }
      draw() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.ctx.fillStyle = COLORS.stars;
        this.stars.forEach(s => {
          s.y += s.s;
          if (s.y > this.canvas.height) s.y = 0;
          this.ctx.globalAlpha = s.o;
          this.ctx.fillRect(s.x, s.y, 1, 1);
        });
        this.ctx.globalAlpha = 1.0;
        if (this.state === 'PLAYING' || this.state === 'PAUSED') {
          this.enemies.forEach(e => e.draw(this.ctx));
          this.bullets.forEach(b => b.draw(this.ctx));
          this.particles.forEach(p => p.draw(this.ctx));
          this.player.draw(this.ctx);
          this.drawHUD();
          this.floating.forEach(f => {
            this.ctx.globalAlpha = f.life;
            this.ctx.fillStyle = '#fff';
            this.ctx.font = 'bold 16px monospace';
            this.ctx.fillText(f.val, f.x, f.y);
          });
          this.ctx.globalAlpha = 1.0;
        }
        if (this.errorFlash > 0) {
          this.ctx.fillStyle = `rgba(255, 0, 0, ${this.errorFlash * 0.3})`;
          this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        }
        this.drawUI();
      }
      drawHUD() {
        this.ctx.fillStyle = COLORS.player;
        this.ctx.font = 'bold 20px monospace';
        this.ctx.textAlign = 'left';
        this.ctx.fillText(`SCORE: ${this.score}`, 20, 40);
        this.ctx.textAlign = 'center';
        this.ctx.fillText(`WAVE ${this.waveMgr.wave}`, this.canvas.width / 2, 40);
        this.ctx.textAlign = 'right';
        this.ctx.fillText(`LIVES: ${'❤️'.repeat(this.player.lives)}`, this.canvas.width - 20, 40);
        this.ctx.textAlign = 'left';
        const acc = this.input.total === 0 ? 100 : Math.round((this.input.correct / this.input.total) * 100);
        this.ctx.fillText(`ACC: ${acc}%`, 20, 70);
      }
      drawUI() {
        this.ui.innerHTML = '';
        if (this.state === 'START') {
          this.ui.innerHTML = `
            <div>
              <h1 class="neon-text" style="font-size: 60px;">TYPE TO SHOOT</h1>
              <p>Type the first letter of a word to lock on. Finish the word to destroy it.</p>
              <p class="blink">PRESS ANY KEY TO START</p>
              <p>HI-SCORE: ${this.hiscore}</p>
            </div>
          `;
        } else if (this.state === 'PAUSED') {
          this.ui.innerHTML = `<h1 class="neon-text" style="font-size: 80px;">PAUSED</h1><p>Press ESC to resume</p>`;
        } else if (this.state === 'GAMEOVER') {
          const acc = this.input.total === 0 ? 100 : Math.round((this.input.correct / this.input.total) * 100);
          this.ui.innerHTML = `
            <div>
              <h1 class="neon-text" style="font-size: 60px;">GAME OVER</h1>
              <p>Final Score: ${this.score}</p>
              <p>Wave Reached: ${this.waveMgr.wave}</p>
              <p>Accuracy: ${acc}%</p>
              <p class="blink">PRESS ENTER TO RESTART</p>
            </div>
          `;
        }
      }
    }

    const game = new Game();
    let lastTime = performance.now();
    function loop(now) {
      const dt = Math.min(now - lastTime, 100); // Cap at 100ms to prevent spiral-of-death
      lastTime = now;
      game.update(dt);
      game.draw();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
